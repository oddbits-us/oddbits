# Synced with Render dashboard (Generate Blueprint from static site `oddbits`).
# https://render.com/docs/infrastructure-as-code
#
# Do not duplicate resources under top-level `services:` — use `projects` only (Blueprint v1).
version: "1"

projects:
  - name: My project
    environments:
      - name: Production
        services:
          - type: web
            name: oddbits
            runtime: static
            repo: https://github.com/oddbits-us/oddbits
            buildCommand: pnpm install --frozen-lockfile && pnpm build
            staticPublishPath: apps/web/dist
            autoDeployTrigger: commit
