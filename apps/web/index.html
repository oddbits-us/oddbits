<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddbits - Developer Tools</title>
  <link rel="stylesheet" href="/src/styles.css">
</head>
<body>
  <header>
    <h1>Oddbits</h1>
    <p>A collection of useful tools for web/app developers and designers</p>
  </header>

  <main>
    <section id="tools">
      <h2>Tools</h2>
      <ul class="tools-list">
        <li class="tool-item">
          <div class="tool-icon">🖼️</div>
          <div class="tool-info">
            <h3>ImageBits</h3>
            <p>Resize, optimize, and convert images to webp, avif, png, jpg</p>
            <a href="https://github.com/oddbits-us/oddbits/tree/main/packages/imagebits" target="_blank" rel="noopener noreferrer" class="tool-link">
              View on GitHub →
            </a>
          </div>
        </li>
      </ul>
      
      <div class="tools-grid">
        <odd-imagebits></odd-imagebits>
      </div>
    </section>
  </main>

  <footer>
    <p>Made with <span class="heart">♥</span> by <a href="https://x.com/dainbrain" target="_blank" rel="noopener noreferrer">@dainbrain</a></p>
  </footer>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
